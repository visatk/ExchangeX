<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="100%" height="100%">
  <defs>
    <!-- Background: Dark Radial Gradient -->
    <radialGradient id="bg-glow" cx="50%" cy="50%" r="60%" fx="50%" fy="50%">
      <stop offset="0%" stop-color="#0f172a" />
      <stop offset="100%" stop-color="#020617" />
    </radialGradient>
    
    <!-- Shield Perimeter: Cyan to Green Gradient -->
    <linearGradient id="shield-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00F0FF" />
      <stop offset="50%" stop-color="#0ea5e9" />
      <stop offset="100%" stop-color="#39FF14" />
    </linearGradient>

    <!-- Syntax Glow Filters -->
    <filter id="neon-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="12" result="blur1" />
      <feGaussianBlur stdDeviation="6" result="blur2" />
      <feGaussianBlur stdDeviation="2" result="blur3" />
      <feMerge>
        <feMergeNode in="blur1" />
        <feMergeNode in="blur2" />
        <feMergeNode in="blur3" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <filter id="drop-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="15" flood-color="#000000" flood-opacity="0.8" />
    </filter>
  </defs>

  <!-- Base Canvas -->
  <rect width="100%" height="100%" fill="url(#bg-glow)" />
  
  <!-- Subtler Background: Hex Grid -->
  <pattern id="hex" width="56.6" height="100" patternUnits="userSpaceOnUse" patternTransform="scale(0.8)">
    <path d="M 28.3 0 L 56.6 16.6 L 56.6 50 L 28.3 66.6 L 0 50 L 0 16.6 Z" fill="none" stroke="rgba(31, 41, 55, 0.4)" stroke-width="1"/>
  </pattern>
  <rect width="100%" height="100%" fill="url(#hex)" />

  <!-- Central Logo Emblem -->
  <g transform="translate(400, 230)" filter="url(#drop-shadow)">
    
    <!-- Outer Shield Body and Border -->
    <path d="M 0 -130 L 110 -85 L 110 25 C 110 90 55 145 0 180 C -55 145 -110 90 -110 25 L -110 -85 Z" 
          fill="#050b14" stroke="url(#shield-grad)" stroke-width="8" stroke-linejoin="round" />
          
    <!-- Inset Shield for 3D/Machined Depth -->
    <path d="M 0 -115 L 96 -76 L 96 22 C 96 80 50 128 0 160 C -50 128 -96 80 -96 22 L -96 -76 Z" 
          fill="none" stroke="#00F0FF" stroke-width="1.5" opacity="0.3" stroke-linejoin="round" />
    
    <!-- Inner Circuit/Network Grid -->
    <path d="M 0 -105 L 85 -70 L 85 15 C 85 65 40 110 0 140 C -40 110 -85 65 -85 15 L -85 -70 Z" 
          fill="rgba(0, 240, 255, 0.02)" stroke="#00F0FF" stroke-width="1.5" stroke-dasharray="6 6" opacity="0.5"/>

    <!-- Executable Code Syntax (</>) -->
    <g>
      <!-- Base Color & Blur -->
      <g filter="url(#neon-glow)">
        <!-- Brackets -->
        <path d="M -35 -35 L -70 0 L -35 35 M 35 -35 L 70 0 L 35 35" 
              fill="none" stroke="#39FF14" stroke-width="12" stroke-linecap="round" stroke-linejoin="round" />
        <!-- Slash -->
        <path d="M 20 45 L -20 -45" 
              fill="none" stroke="#00F0FF" stroke-width="12" stroke-linecap="round" />
      </g>
      
      <!-- Intense White Core for Realistic Neon Light -->
      <path d="M -35 -35 L -70 0 L -35 35 M 35 -35 L 70 0 L 35 35" 
            fill="none" stroke="#FFFFFF" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" opacity="0.9" />
      <path d="M 20 45 L -20 -45" 
            fill="none" stroke="#FFFFFF" stroke-width="3" stroke-linecap="round" opacity="0.9" />
    </g>
    
    <!-- Integrated BD Microchip Path -->
    <g transform="translate(0, 115)">
      <!-- Network Trace Box -->
      <path d="M -25 -12 L 25 -12 L 25 12 L -25 12 Z" 
            fill="#020617" stroke="#00F0FF" stroke-width="2" />
      <!-- Circuit Connectors -->
      <path d="M -35 0 L -25 0 M 25 0 L 35 0 M -10 -18 L -10 -12 M 10 -18 L 10 -12 M -10 12 L -10 18 M 10 12 L 10 18" 
            fill="none" stroke="#39FF14" stroke-width="2" />
      <!-- 'BD' Embedded Text -->
      <text x="0" y="4" fill="#00F0FF" font-family="'Courier New', Courier, monospace" font-size="14" font-weight="bold" text-anchor="middle" letter-spacing="2">
        BD
      </text>
    </g>
  </g>

  <!-- High-Hierarchy Typography -->
  <g transform="translate(400, 480)" text-anchor="middle" font-family="'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
    
    <!-- Refined Brand Name: CyberCoderBD -->
    <text x="0" y="0" fill="#FFFFFF" font-size="52" font-weight="900" letter-spacing="10">
      CYBER<tspan fill="#00F0FF">CODER</tspan><tspan fill="#39FF14">BD</tspan>
    </text>
    
    <!-- Sub-brand / Scope -->
    <text x="0" y="40" fill="#a1a1aa" font-size="16" font-weight="600" letter-spacing="8">
      [ <tspan fill="#39FF14">SECURITY</tspan> &amp; <tspan fill="#00F0FF">DEVELOPMENT</tspan> ]
    </text>
  </g>
</svg>
